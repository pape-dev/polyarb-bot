// ─── UTILS ────────────────────────────────────────────────────
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
function mkAbort(ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return { signal: ctrl.signal, cancel: () => clearTimeout(t) };
}

// [5] Batching séquentiel anti-throttle
async function batchMap(arr, fn, batchSize=4, delayMs=200) {
  const results = [];
  for (let i=0; i<arr.length; i+=batchSize) {
    const batch = arr.slice(i, i+batchSize);
    const res = await Promise.all(batch.map(fn));
    results.push(...res);
    if (i+batchSize < arr.length)
      await new Promise(r => setTimeout(r, delayMs));
  }
  return results;
}

// ─── API (inchangé v6) ────────────────────────────────────────
async function discoverMarkets() {
  const { signal, cancel } = mkAbort(7000);
  try {
    const r = await fetch(`https://polyarb-proxy-production.up.railway.app/markets`, { signal });
    cancel();
    if (!r.ok) throw new Error();
    const raw = await r.json();
    const list = Array.isArray(raw) ? raw : (raw.markets ?? []);
    return list.filter(m => m.active && !m.closed).map(m => {
      const p = parseFloat(Array.isArray(m.outcomePrices) ? m.outcomePrices[0] : (m.bestAsk ?? "0.5"));
      return {
        slug: m.slug,
        tokenId: m.clobTokenIds?.[0] ?? m.conditionId ?? m.id ?? m.slug,
        title: (m.question ?? m.title ?? m.slug).slice(0,80),
        price: isNaN(p) ? 0.5 : clamp(p, 0.01, 0.99),
        volume24h: parseFloat(m.volume24hr ?? m.volume ?? 0),
        liquidity: parseFloat(m.liquidity ?? 0),
      };
    });
  } catch { cancel(); return []; }
}

async function fetchPrice(slug) {
  const { signal, cancel } = mkAbort(4000);
  try {
    const r = await fetch(`${GAMMA}/markets?slug=${slug}&limit=1`, { signal });
    cancel();
    if (!r.ok) throw new Error();
    const raw = await r.json();
    const m = Array.isArray(raw) ? raw[0] : raw?.markets?.[0];
    if (!m || !m.active || m.closed) return null;
    const p = parseFloat(Array.isArray(m.outcomePrices) ? m.outcomePrices[0] : (m.bestAsk ?? "0.5"));
    return isNaN(p) ? null : clamp(p, 0.01, 0.99);
  } catch { cancel(); return null; }
}

async function fetchBook(tokenId) {
  const { signal, cancel } = mkAbort(3000);
  try {
    const r = await fetch(`${CLOB}/book?token_id=${tokenId}`, { signal });
    cancel();
    if (!r.ok) throw new Error();
    const d = await r.json();
    return {
      simulated: false,
      bids: (d.bids ?? []).slice(0,5).map(b => ({ price:+b.price, size:+b.size })),
      asks: (d.asks ?? []).slice(0,5).map(a => ({ price:+a.price, size:+a.size })),
    };
  } catch { cancel(); return { simulated:true, bids:[], asks:[] }; }
}

// ═══════════════════════════════════════════════════════════════
// MATH PURES — TOUTES INCHANGÉES (signatures préservées)
// ═══════════════════════════════════════════════════════════════
function median(arr) {
  if (!arr.length) return 0.5;
  const s = [...arr].sort((a,b) => a-b);
  const m = Math.floor(s.length/2);
  return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m];
}
function normalCDF(z) {
  const t = 1/(1+0.2316419*Math.abs(z));
  const p = t*(0.31938153+t*(-0.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));
  const phi = 1-(1/Math.sqrt(2*Math.PI))*Math.exp(-0.5*z*z)*p;
  return z>=0 ? phi : 1-phi;
}
function chiSqPValue(chi2) {
  if (chi2 <= 0) return 1;
  return 2*(1-normalCDF(Math.sqrt(chi2)));
}
function chiSquare2x2(a, b, c, d) {
  const n = a+b+c+d;
  if (n < 4) return 0;
  const r1=a+b, r2=c+d, c1=a+c, c2=b+d;
  const ea=r1*c1/n, eb=r1*c2/n, ec=r2*c1/n, ed=r2*c2/n;
  const safe = (obs,exp) => exp>0.5 ? (obs-exp)**2/exp : 0;
  return safe(a,ea)+safe(b,eb)+safe(c,ec)+safe(d,ed);
}
function wilsonCI(k, n, z=1.96) {
  if (n===0) return [0,1];
  const p=k/n;
  const denom = 1+z*z/n;
  const center = (p+z*z/(2*n))/denom;
  const margin = z*Math.sqrt(p*(1-p)/n+z*z/(4*n*n))/denom;
  return [clamp(center-margin,0,1), clamp(center+margin,0,1)];
}
function computeBayesEst(histA, histB, livePriceA) {
  const n = Math.min(histA.length, histB.length);
  if (n < 4) return null;
  const hA = histA.slice(-n), hB = histB.slice(-n);
  const medA = median(hA), medB = median(hB);
  let nHigh=0, nLow=0, kB_H=0, kB_L=0;
  for (let i=0; i<n; i++) {
    if (hA[i] > medA) { nHigh++; if (hB[i] > medB) kB_H++; }
    else              { nLow++;  if (hB[i] > medB) kB_L++; }
  }
  if (nHigh < 2 || nLow < 2) return null;
  const aH=1+kB_H, bH=1+(nHigh-kB_H), aL=1+kB_L, bL=1+(nLow-kB_L);
  const pB_givenA    = aH/(aH+bH);
  const pB_givenNotA = aL/(aL+bL);
  const ci_H = wilsonCI(kB_H, nHigh);
  const ci_L = wilsonCI(kB_L, nLow);
  const chi2  = chiSquare2x2(kB_H, nHigh-kB_H, kB_L, nLow-kB_L);
  const pValue = chiSqPValue(chi2);
  const significant = pValue < 0.05 && n >= 8;
  const delta    = Math.abs(pB_givenA - pB_givenNotA);
  const direction = pB_givenA > pB_givenNotA ? 1 : -1;
  const depClass = delta >= 0.15 ? "strong" : delta >= 0.05 ? "weak" : "independent";
  const pA_live = clamp(livePriceA, 0.01, 0.99);
  const fair    = clamp(pB_givenA*pA_live + pB_givenNotA*(1-pA_live), 0.01, 0.99);
  const fairLo  = clamp(ci_H[0]*pA_live + ci_L[0]*(1-pA_live), 0.01, 0.99);
  const fairHi  = clamp(ci_H[1]*pA_live + ci_L[1]*(1-pA_live), 0.01, 0.99);
  // bhSignificant initialisé false, mis à jour par bhCorrect()
  return { n, nHigh, nLow, pB_givenA, pB_givenNotA, ci_H, ci_L, delta, direction,
           depClass, fair, fairCI:[fairLo,fairHi], chi2, pValue, significant, bhSignificant:false };
}

// ─── [3] CORRECTION FDR Benjamini-Hochberg ────────────────────
function bhCorrect(pairs) {
  const withEst = pairs.filter(p => p.bayesEst?.pValue != null);
  const m = withEst.length;
  if (m === 0) return pairs;
  const sorted = [...withEst].sort((a,b) => a.bayesEst.pValue - b.bayesEst.pValue);
  const fdrLevel = 0.10; // [v8-6] niveau FDR amélioré (était 0.05)
  const thresholds = sorted.map((p, i) => p.bayesEst.pValue <= (i+1)/m * fdrLevel);
  let lastTrue = -1;
  thresholds.forEach((v,i) => { if(v) lastTrue = i; });
  const accepted = new Set(sorted.slice(0, lastTrue+1).map(p => p.id));
  return pairs.map(p => ({
    ...p,
    bayesEst: p.bayesEst
      ? { ...p.bayesEst, bhSignificant: accepted.has(p.id) }
      : null,
  }));
}

// ─── VALIDATION — [3] bhSignificant check ajouté ──────────────
function validateSignal(est, livePriceB, cfg) {
  if (!est) return { valid:false, reason:"NO_DATA" };
  if (est.n < cfg.minBayesPts) return { valid:false, reason:`N=${est.n}<${cfg.minBayesPts}` };
  if (cfg.requireSig && !est.significant)   return { valid:false, reason:`p=${est.pValue.toFixed(2)}` };
  if (cfg.requireBH  && !est.bhSignificant) return { valid:false, reason:"BH_REJECT" };
  if (est.delta < cfg.minDelta) return { valid:false, reason:`δ<${(cfg.minDelta*100).toFixed(0)}` };
  if (est.depClass==="independent") return { valid:false, reason:"INDEP" };
  const edge = est.fair - livePriceB;
  if (Math.abs(edge) < cfg.minEdge) return { valid:false, reason:"Edge↓" };
  if (cfg.ciReject) {
    const [lo,hi] = est.fairCI;
    if (livePriceB >= lo && livePriceB <= hi) return { valid:false, reason:"CI_OVERLAP" };
  }
  // [v8-2] side déterminé par le signe de l'edge
  const side = edge > 0 ? "BUY" : "SELL";
  return { valid:true, reason:"OK", edge, side };
}

// ─── STRUCTUREL (inchangé v6) ─────────────────────────────────
const WIN_KW  = ["win","yes","pass","approve","elect","beats","above","rise","higher","over","surpass"];
const LOSE_KW = ["lose","no","fail","reject","defeat","below","fall","lower","not","under","miss"];
const STOPWORDS = new Set([
  "will","the","a","an","of","in","to","is","be","by","or","and","for","on","at","from","with","as",
  "has","have","does","do","its","this","that","which","are","was","were","been","can","may","would",
  "could","should","than","then","but","so","if","when","how","what","who","more","less","most","least",
  "market","price","prediction","chance","probability","percent","pct","end","before","after","during",
]);
function subjectScore(titleA, titleB) {
  const tokenize = t => t.toLowerCase().replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(w => w.length>2 && !STOPWORDS.has(w));
  const tokA = new Set(tokenize(titleA));
  return tokenize(titleB).filter(w => tokA.has(w)).length;
}
function detectStructural(titleA, titleB, pA, pB, slipMax) {
  const score = subjectScore(titleA, titleB);
  if (score < 2) return null;
  const a = titleA.toLowerCase(), b = titleB.toLowerCase();
  const aW = WIN_KW.some(k=>a.includes(k)),  aL = LOSE_KW.some(k=>a.includes(k));
  const bW = WIN_KW.some(k=>b.includes(k)),  bL = LOSE_KW.some(k=>b.includes(k));
  const sum = pA + pB;
  if ((aW&&bL)||(aL&&bW)) {
    const dev = Math.abs(sum - 1);
    return { type:"COMPL", sum, dev, score, arb: dev > slipMax*2 };
  }
  if (aW && bW && sum > 1 + slipMax) return { type:"MUTEX", sum, dev:sum-1, score, arb:true };
  return null;
}

// ─── KELLY (inchangé sauf [v8-4]) ────────────────────────────
function kellySize(price, winProb, bankroll, cfg, est, aiConf=null) {
  if (winProb<=0||price<=0||price>=1) return 0;
  const b=(1-price)/price, q=1-winProb;
  const raw=(b*winProb-q)/b;
  if (raw<=0) return 0;
  let conf = 1;
  if (est) {
    const ciW = (est.ci_H[1]-est.ci_H[0]) + (est.ci_L[1]-est.ci_L[0]);
    conf = clamp(1 - ciW/2, 0.15, 1);
  }
  // [v8-4] Pondération par confiance IA : 7/10 = pleine taille
  if (aiConf !== null) conf *= clamp(aiConf / 7, 0.3, 1.0);
  return clamp(raw*cfg.kellyFrac*conf*bankroll, 0, bankroll*cfg.maxPct);
}
function estSlippage(ob, sizeUSDC) {
  const levels=ob?.asks??[];
  if(!levels.length) return 0.05;
  let rem=sizeUSDC,cost=0;
  const top=levels[0]?.price??0.5;
  for(const l of levels){const av=l.price*l.size;if(rem<=av){cost+=rem;rem=0;break;}cost+=av;rem-=av;}
  if(rem>0) return 0.08;
  return Math.abs(cost/sizeUSDC-top)/top;
}
function calcSharpe(returns) {
  if(returns.length<2) return 0;
  const avg=returns.reduce((s,v)=>s+v,0)/returns.length;
  const std=Math.sqrt(returns.reduce((s,v)=>s+(v-avg)**2,0)/(returns.length-1));
  return std<1e-9?0:avg/std*Math.sqrt(252);
}

// ═══════════════════════════════════════════════════════════════
// PAIR DISCOVERY — [1] savedHist optionnel dans makePair / buildPairs
// ═══════════════════════════════════════════════════════════════
function makePair(idStr, cat, catLabel, mA, mB, prev, savedHist={}) {
  const ex = prev?.find(x => x.id === idStr);
  const sh = savedHist[idStr];
  return {
    id: idStr, cat, catLabel,
    mA, mB, labelA:mA.title, labelB:mB.title,
    histA: ex?.histA ?? sh?.histA ?? [],
    histB: ex?.histB ?? sh?.histB ?? [],
    pA:mA.price, pB:mB.price,
    bayesEst: ex?.bayesEst ?? null,
    analysis: ex?.analysis ?? null,
    aiLoading: false,
    validation: {valid:false, reason:"INIT", edge:0},
    structural: null,
    pBFair: mB.price, fairCI:[0,1],
    edge:0, ob:null, kellyUSDC:0, slip:0.02,
  };
}

function buildPairs(markets, prev=[], savedHist={}) {
  const VOL_MIN = 5000, LIQ_MIN = 1000;
  const groups = {};
  for (const m of markets) {
    if (m.volume24h < VOL_MIN || m.liquidity < LIQ_MIN) continue;
    const txt = (m.title+" "+m.slug).toLowerCase();
    for (const seed of SEEDS) {
      if (seed.kw.some(k => txt.includes(k))) { (groups[seed.id] ??= []).push(m); break; }
    }
  }
  const intra = [], topByCategory = {};
  for (const [cat, mks] of Object.entries(groups)) {
    const s = [...mks].sort((a,b) => b.volume24h - a.volume24h).slice(0,5);
    topByCategory[cat] = s;
    const emoji = SEEDS.find(x => x.id === cat)?.emoji ?? "•";
    for (let i=0; i<s.length; i++)
      for (let j=i+1; j<s.length; j++)
        intra.push(makePair(`${cat}-${i}${j}`, emoji, cat, s[i], s[j], prev, savedHist));
  }
  const crossPairs = [];
  // [v8-6] 6 cross-catégories (3 nouvelles) + 2 paires par cross (00 et 11)
  for (const [idBase, cat, catLabel, catA, catB] of [
    ["CROSS-CM","↔","CRYPTO×MACRO","CRYPTO","MACRO"],
    ["CROSS-TC","↔","TECH×CRYPTO","TECH","CRYPTO"],
    ["CROSS-GM","↔","GEO×MACRO","GEO","MACRO"],
    ["CROSS-PG","↔","POL×GEO","POLITICS","GEO"],     // [v8-6]
    ["CROSS-PM","↔","POL×MACRO","POLITICS","MACRO"],  // [v8-6]
    ["CROSS-SM","↔","SPORTS×MACRO","SPORTS","MACRO"], // [v8-6]
  ]) {
    const grpA=topByCategory[catA], grpB=topByCategory[catB];
    if(grpA?.length && grpB?.length) {
      crossPairs.push(makePair(`${idBase}-00`, cat, catLabel, grpA[0], grpB[0], prev, savedHist));
      if(grpA.length>1 && grpB.length>1)                                         // [v8-6] paire secondaire
        crossPairs.push(makePair(`${idBase}-11`, cat, catLabel, grpA[1], grpB[1], prev, savedHist));
    }
  }
  return [...intra, ...crossPairs];
}

        if(sp?.value) setPositions(JSON.parse(sp.value));
        if(sb?.value){ const b=parseFloat(sb.value); setBankroll(b); brRef.current=b; }
        if(sc?.value) setCfg(c=>({...c,...JSON.parse(sc.value)}));
        if(ss?.value) setStartBr(parseFloat(ss.value));

        // [1] Restaurer histoires glissants
        if(sh?.value) {
          savedHistRef.current = JSON.parse(sh.value);
          log("SYS",`Historique restauré (${Object.keys(savedHistRef.current).length} paires) — warm-up immédiat`);
        }
        // [2] Restaurer/réinitialiser compteur journalier
        if(sd?.value) {
          const saved = JSON.parse(sd.value);
          const today = new Date().toISOString().slice(0,10);
          dailyRef.current = saved.date === today ? saved : { date:today, count:0 };
        }
        log("SYS","État restauré — v8");
      } catch { log("SYS","Démarrage frais — v8"); }
    })();
  },[]);

  // Persister positions + métriques
  useEffect(()=>{
    window.storage?.set("pa6_pos",JSON.stringify(positions.slice(-200))).catch(()=>{});
    const cl=positions.filter(p=>p.status==="CLOSED");
    const pnl=cl.reduce((s,p)=>s+(p.pnlUSDC??0),0);
    const wins=cl.filter(p=>(p.pnlUSDC??0)>0).length;
    setMetrics({pnl,winRate:cl.length?wins/cl.length:0,sharpe:calcSharpe(cl.map(p=>(p.pnlUSDC??0)/Math.max(p.size,1))),trades:positions.length});
  },[positions]);
  useEffect(()=>{ window.storage?.set("pa6_br",String(bankroll)).catch(()=>{}); },[bankroll]);
  useEffect(()=>{ window.storage?.set("pa6_cfg",JSON.stringify(cfg)).catch(()=>{}); },[cfg]);

  // [1] Persister histA/histB à chaque refresh
  useEffect(()=>{
    if(!pairs.length) return;
    const hist = {};
    pairs.forEach(p => { hist[p.id] = { histA: p.histA, histB: p.histB }; });
    window.storage?.set("pa6_hist", JSON.stringify(hist)).catch(()=>{});
  },[pairs]);

  // Découverte — [1] passe savedHistRef
  const discover = useCallback(async()=>{
    setDiscovering(true);
    log("DISC","Scan marchés Polymarket…");
    const markets = await discoverMarkets();
    if(markets.length>0){
      setApiSt(s=>({...s,gamma:"ok"}));
      setPairs(prev=>{
        const np = buildPairs(markets, prev, savedHistRef.current);
        log("DISC",`${markets.length} marchés → ${np.length} paires`);
        return np;
      });
    } else {
      setApiSt(s=>({...s,gamma:"cors"}));
      log("WARN","Gamma API bloquée (CORS)");
    }
    setDiscovering(false);
  },[log]);

  // ── Close helpers ────────────────────────────────────────────
  const closePosById = useCallback((posId, reason)=>{
    setPositions(prev=>prev.map(p=>{
      if(p.id!==posId||p.status!=="OPEN") return p;
      const pair = pairsRef.current.find(x=>x.id===p.pairId);
      const exit = pair?.pB ?? p.currentPrice ?? p.entry;
      const pnlUSDC = (exit-p.entry)*p.size/p.entry;
      setBankroll(b=>b+p.size+pnlUSDC);
      // [v8-3] log distinct pour inversion de signal
      if(reason==="FLIP")
        log("FLIP",`SIGNAL INVERSÉ ${p.label.slice(0,35)} exit=${(exit*100).toFixed(1)}¢ PnL=${pnlUSDC>=0?"+":""}$${pnlUSDC.toFixed(2)}`);
      else
        log(reason==="SL"?"RISK":"CLOSE",
          `${reason==="SL"?"AUTO-SL":"AUTO-TP"} ${p.label.slice(0,35)} exit=${(exit*100).toFixed(1)}¢ PnL=${pnlUSDC>=0?"+":""}$${pnlUSDC.toFixed(2)}`);
      return{...p,status:"CLOSED",exitPrice:exit,pnlUSDC,closedAt:new Date().toISOString()};
    }));
  },[log]);

  const closePos = useCallback((posId)=>{
    setPositions(prev=>prev.map(p=>{
      if(p.id!==posId||p.status!=="OPEN") return p;
      const pair = pairsRef.current.find(x=>x.id===p.pairId);
      const exit = pair?.pB ?? p.currentPrice ?? p.entry;
      const pnlUSDC = (exit-p.entry)*p.size/p.entry;
      setBankroll(b=>b+p.size+pnlUSDC);
      log("CLOSE",`${p.label.slice(0,40)} exit=${(exit*100).toFixed(1)}¢ PnL=${pnlUSDC>=0?"+":""}$${pnlUSDC.toFixed(2)}`);
      return{...p,status:"CLOSED",exitPrice:exit,pnlUSDC,closedAt:new Date().toISOString()};
    }));
  },[log]);

  // ── Refresh — FIX 1.3 bhCorrect + 1.4 winProb CI + 1.5 batchMap ──
  const refresh = useCallback(async()=>{
    const cur = pairsRef.current;
    if(!cur.length) return;
    const c = cfgRef.current, br = brRef.current;

    // [5] batchMap remplace Promise.all global
    const rawUpdated = await batchMap(cur, async pair=>{
      const [pA,pB] = await Promise.all([fetchPrice(pair.mA.slug),fetchPrice(pair.mB.slug)]);
      const nPA=pA??pair.pA, nPB=pB??pair.pB;
      const hA=[...pair.histA.slice(-(c.histWindow-1)), nPA];
      const hB=[...pair.histB.slice(-(c.histWindow-1)), nPB];
      const est = computeBayesEst(hA, hB, nPA);
      const structural = detectStructural(pair.labelA, pair.labelB, nPA, nPB, c.slipMax);
      const ob = await fetchBook(pair.mB.tokenId);
      if(!ob.simulated) setApiSt(s=>({...s,clob:"ok"}));
      const fair   = est?.fair ?? nPB;
      const fairCI = est?.fairCI ?? [0,1];
      // [v8-5] winProb = milieu entre borne basse CI95 et fair (moins conservateur)
      const winProb = est
        ? clamp((est.fairCI[0] + est.fair) / 2, 0.01, 0.95)
        : clamp(fair, 0.01, 0.95);
      // Kelly pré-BH (validation sans requireBH pour éviter le bootstrap circulaire)
      const preBHval = validateSignal(est, nPB, {...c, requireBH:0});
      // [v8-4] passe la confiance IA courante pour pondérer la taille
      const aiConf = pair.analysis?.confidence ?? null;
      const kUSDC  = preBHval.valid ? kellySize(nPB, winProb, br, c, est, aiConf) : 0;
      const slip   = estSlippage(ob, Math.max(kUSDC,50));
      return { ...pair, pA:nPA, pB:nPB, bayesEst:est, structural, pBFair:fair, fairCI,
               histA:hA, histB:hB, ob, kellyUSDC:kUSDC, slip, _winProb:winProb };
    }, c.apiBatch, c.apiDelay);

    // [3] BH correction sur toutes les paires, puis validation finale
    const updated = bhCorrect(rawUpdated).map(pair=>{
      const est = pair.bayesEst;
      const validation = validateSignal(est, pair.pB, c);
      const edge = validation.valid ? validation.edge : 0;
      // [v8-4] repasse aiConf au kelly final
      const aiConf = pair.analysis?.confidence ?? null;
      const kUSDC = validation.valid
        ? kellySize(pair.pB, pair._winProb ?? clamp(pair.pBFair,0.01,0.95), brRef.current, c, est, aiConf)
        : 0;
      if(validation.valid){
        const conf=est?clamp(1-(est.ci_H[1]-est.ci_H[0]+est.ci_L[1]-est.ci_L[0])/2,0,1):0;
        // [v8-2] affiche le side dans le log SIG
        log("SIG",`${pair.id} ${validation.side??'BUY'} EDGE ${(edge*100).toFixed(1)}% δ=${(est?.delta*100??0).toFixed(0)}pp p=${est?.pValue.toFixed(3)??'–'} BH=${est?.bhSignificant?'✓':'✗'} conf=${(conf*100).toFixed(0)}%`);
      }
      if(pair.structural?.arb)
        log("STRUCT",`${pair.id} [${pair.structural.type}] score=${pair.structural.score} sum=${pair.structural.sum.toFixed(2)}`);
      return { ...pair, validation, edge, kellyUSDC:kUSDC };
    });

    setPairs(updated);

    // Auto-exits SL/TP + [v8-3] FLIP
    const toClose=[];
    setPositions(prev=>prev.map(p=>{
      if(p.status!=="OPEN") return p;
      const pair = updated.find(x=>x.id===p.pairId);
      if(!pair) return p;
      const pnlUSDC = (pair.pB-p.entry)*p.size/p.entry;
      const pnlPct  = (pair.pB-p.entry)/p.entry;
      const c2 = cfgRef.current;
      if(pnlPct <= -c2.stopLoss)       toClose.push({id:p.id, reason:"SL"});
      else if(pnlPct >= c2.takeProfit) toClose.push({id:p.id, reason:"TP"});
      else {
        // [v8-3] Fermeture si signal inversé
        const openedSide  = p.payload?.side ?? "BUY";
        const currentEdge = pair.edge;
        const signalFlipped = (openedSide==="BUY"  && currentEdge < -c2.minEdge)
                           || (openedSide==="SELL" && currentEdge >  c2.minEdge);
        if(signalFlipped) toClose.push({id:p.id, reason:"FLIP"});
      }
      return{...p, currentPrice:pair.pB, pnlUSDC};
    }));
    setTimeout(()=>toClose.forEach(({id,reason})=>closePosById(id,reason)),0);

    // [v8-1] AUTO-EXECUTE — déclenché après BH et validation finale
    if(cfgRef.current.autoExec===1){
      const now = Date.now();
      for(const pair of updated){
        if(!pair.validation.valid) continue;
        if(pair.kellyUSDC < 1) continue;
        if(pair.slip > cfgRef.current.slipMax) continue;
        // Vérifier cooldown
        if((cdRef.current[pair.id]??0) > now) continue;
        // Vérifier qu'aucune position OPEN n'existe déjà sur cette paire
        if(posRef.current.some(p=>p.pairId===pair.id&&p.status==="OPEN")) continue;
        // Vérifier confiance IA si seuil actif
        if(cfgRef.current.autoExecMinConf>0 &&
           (pair.analysis?.confidence??0) < cfgRef.current.autoExecMinConf) continue;
        execute(pair.id); // sans await — non bloquant
      }
    }
  },[log, closePosById]);

  // [2] Timer recréé sur changement refreshMs
  useEffect(()=>{
    clearInterval(timerRef.current);
    const boot = setTimeout(()=>{
      refresh();
      timerRef.current = setInterval(refresh, cfg.refreshMs);
    }, timerRef.current ? 0 : 3000);
    return()=>{ clearTimeout(boot); clearInterval(timerRef.current); };
  },[refresh, cfg.refreshMs]);

  useEffect(()=>{
    discover();
    discRef.current = setInterval(discover, 300000);
    return()=>clearInterval(discRef.current);
  },[discover]);

  const currentExposure = useCallback(()=>{
    return posRef.current.filter(p=>p.status==="OPEN").reduce((s,p)=>s+p.size,0);
  },[]);

  // ── Execute — FIX 1.2 (dailyRef objet) + 1.6 (startBr) ─────
  const execute = useCallback(async(pairId)=>{
    const pair = pairsRef.current.find(p=>p.id===pairId);
    if(!pair) return;
    const c=cfgRef.current, br=brRef.current, now=Date.now();

    if((cdRef.current[pairId]??0)>now){log("WARN",`${pairId} cooldown`);return;}
    // [2] check via objet
    if(dailyRef.current.count >= c.maxDaily){log("RISK","Limite journalière atteinte");return;}
    if(pair.slip>c.slipMax){log("RISK",`slip ${(pair.slip*100).toFixed(1)}%`);return;}
    if(!pair.validation.valid){log("WARN",`Signal invalide: ${pair.validation.reason}`);return;}
    if(pair.kellyUSDC<1){log("WARN","Kelly<$1");return;}

    const expo=currentExposure(), expoMax=br*c.maxExposure;
    let size=pair.kellyUSDC;
    if(expo+size>expoMax){
      const room=expoMax-expo;
      if(room<1){log("RISK","EXPO_LIMIT");return;}
      size=room; log("RISK",`EXPO_CAP → $${size.toFixed(2)}`);
    }

    const payload={market:pair.mB.slug,tokenId:pair.mB.tokenId,
      side:pair.validation.side??"BUY", // [v8-2] side BUY ou SELL selon l'edge
      type:"MARKET",amount:+size.toFixed(2),price:+pair.pB.toFixed(4),ts:now};
    let mode="PAPER";
    if(c.proxyUrl){
      try{
        const r=await fetch(c.proxyUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        mode="LIVE"; log("EXEC","Ordre live envoyé");
      }catch(e){log("ERR",`Proxy: ${e.message} → PAPER`);}
    }

    const est=pair.bayesEst;
    const pos={
      id:`${pairId}-${now}`, pairId, label:pair.labelB, slug:pair.mB.slug, tokenId:pair.mB.tokenId,
      entry:pair.pB, currentPrice:pair.pB, fair:pair.pBFair, fairCI:pair.fairCI, edge:pair.edge,
      pB_givenA:est?.pB_givenA??0, pB_givenNotA:est?.pB_givenNotA??0,
      delta:est?.delta??0, depClass:est?.depClass??"unknown",
      size, ts:new Date().toISOString(), status:"OPEN", mode, pnlUSDC:0, payload,
    };

    setPositions(p=>[...p,pos]);
    setBankroll(b=>b-size);

    // [6] Figer startBr au premier trade de la session
    if(dailyRef.current.count === 0){
      setStartBr(br);
      window.storage?.set("pa6_startbr", String(br)).catch(()=>{});
    }

    // [2] Incrémenter + persister
    dailyRef.current = { ...dailyRef.current, count: dailyRef.current.count + 1 };
    window.storage?.set("pa6_daily", JSON.stringify(dailyRef.current)).catch(()=>{});

    cdRef.current[pairId]=now+c.cooldown;
    // [v8-2] log avec side dynamique
    const side=pair.validation.side??"BUY";
    log("ORDER",`[${mode}] ${side} ${pair.labelB.slice(0,40)} @${(pair.pB*100).toFixed(1)}¢ $${size.toFixed(2)} δ=${est?(est.delta*100).toFixed(0):0}pp`);
  },[log, currentExposure]);

  const requestAI = useCallback(async(pairId)=>{
    const pair = pairsRef.current.find(p=>p.id===pairId);
    if(!pair||!pair.bayesEst) return;
    setPairs(prev=>prev.map(p=>p.id===pairId?{...p,aiLoading:true}:p));
    const a = await aiAnalyze(pair.labelA,pair.labelB,pair.pA,pair.pB,pair.pBFair,pair.fairCI,pair.edge,pair.bayesEst);
    setPairs(prev=>prev.map(p=>p.id===pairId?{...p,aiLoading:false,analysis:a??p.analysis}:p));
    if(a) log("AI",`${pairId} conf=${a.confidence}/10 — ${a.bull}`);
    else  log("WARN",`${pairId} IA: réponse vide`);
  },[log]);

  return{cfg,setCfg,bankroll,startBr,pairs,positions,logs,metrics,apiSt,tab,setTab,
         discovering,execute,closePos,discover,requestAI,currentExposure};
}

// ═══════════════════════════════════════════════════════════════
// UI COMPONENTS — TOUS INCHANGÉS (v6)
// ═══════════════════════════════════════════════════════════════
const CLR={
  bg0:"#030b12",bg1:"#050f18",bg2:"#071520",
  line:"#0a1e2e",line2:"#0e2d43",
  amber:"#ffb300",amberD:"rgba(255,179,0,.12)",
  green:"#00e676",greenD:"rgba(0,230,118,.1)",
  red:"#ff3d5a",redD:"rgba(255,61,90,.1)",
  cyan:"#00cfff",cyanD:"rgba(0,207,255,.08)",
  violet:"#ce93d8",violetD:"rgba(206,147,216,.08)",
  teal:"#26c6da",tealD:"rgba(38,198,218,.08)",
  orange:"#ff9800",orangeD:"rgba(255,152,0,.08)",
  txt:"#4d7f99",txt2:"#7aafc4",txt3:"#b8d4e0",
  muted:"#1e4d66",
};
const DEP_CLR={strong:CLR.green,weak:CLR.amber,independent:CLR.red};
const DEP_LBL={strong:"FORT",weak:"FAIBLE",independent:"INDEP"};

function Badge({color,pulse,children}){
  return<span style={{fontSize:8,padding:"1px 5px",borderRadius:2,fontWeight:700,letterSpacing:.8,border:`1px solid ${color}`,color,animation:pulse?"blk 1.6s ease infinite":undefined}}>{children}</span>;
}
function Stat({label,value,color,tiny}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:1,minWidth:tiny?30:42}}>
      <div style={{fontSize:7,color:CLR.muted,letterSpacing:.8}}>{label}</div>
      <div style={{fontSize:tiny?9:11,fontWeight:700,color:color??CLR.txt2,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1}}>{value}</div>
    </div>
  );
}
function CIBar({fair,fairCI,marketPrice,width=280}){
  const lo=fairCI[0],hi=fairCI[1];
  const toX=p=>clamp((p-0.01)/0.98*width,0,width);
  const fX=toX(fair),mX=toX(marketPrice),loX=toX(lo),hiX=toX(hi);
  const ciW=Math.max(hiX-loX,2);
  const overlap=marketPrice>=lo&&marketPrice<=hi;
  return(
    <svg width={width} height={14} style={{display:"block"}}>
      <rect x={0} y={6} width={width} height={2} fill={CLR.muted} opacity={0.3} rx={1}/>
      <rect x={loX} y={4} width={ciW} height={6} fill={overlap?CLR.amber:CLR.cyan} opacity={0.25} rx={1}/>
      <line x1={fX} y1={1} x2={fX} y2={13} stroke={CLR.cyan} strokeWidth={1.5}/>
      <line x1={mX} y1={1} x2={mX} y2={13} stroke={overlap?CLR.amber:CLR.green} strokeWidth={1.5} strokeDasharray={overlap?"3,2":undefined}/>
      <text x={fX} textAnchor="middle" fill={CLR.cyan} fontSize={6} y={6} dominantBaseline="hanging">F</text>
      <text x={mX} textAnchor="middle" fill={overlap?CLR.amber:CLR.green} fontSize={6} y={6} dominantBaseline="hanging">M</text>
    </svg>
  );
}
function Spinner(){
  return <span style={{display:"inline-block",width:10,height:10,border:`1.5px solid ${CLR.muted}`,borderTopColor:CLR.violet,borderRadius:"50%",animation:"spin .7s linear infinite",verticalAlign:"middle"}}></span>;
}

function PairRow({pair,cfg,onExec,onAI}){
  const{bayesEst:est,validation:val,structural:strct}=pair;
  const ready=val.valid&&pair.kellyUSDC>=1&&pair.slip<=cfg.slipMax;
  const hasAI=!!pair.analysis;
  const depC=est?DEP_CLR[est.depClass]:CLR.muted;
  const depL=est?DEP_LBL[est.depClass]:"…";
  const isCross=pair.id.startsWith("CROSS");
  return(
    <div style={{borderBottom:`1px solid ${CLR.line}`,padding:"8px 10px",background:ready?CLR.greenD:strct?.arb?CLR.orangeD:isCross?"rgba(206,147,216,.04)":"transparent"}}>
      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
        <span style={{fontSize:10,minWidth:18}}>{pair.cat}</span>
        <span style={{fontSize:8,color:isCross?CLR.violet:CLR.muted,letterSpacing:1}}>{pair.catLabel}</span>
        <span style={{marginLeft:"auto",fontSize:7,color:CLR.muted}}>{(est?.n??0)}/{cfg.histWindow}pts</span>
        <Badge color={depC}>{depL}</Badge>
        {est?.bhSignificant&&<Badge color={CLR.teal}>BH✓</Badge>}
        {ready&&<Badge color={CLR.green} pulse>SIGNAL</Badge>}
        {strct?.arb&&<Badge color={CLR.orange}>STRUCT</Badge>}
        {hasAI&&<Badge color={CLR.violet}>{pair.analysis.confidence}/10</Badge>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 54px 1fr 54px",gap:4,marginBottom:6,alignItems:"start"}}>
        <div style={{fontSize:8,color:CLR.txt,lineHeight:1.35}}>{pair.labelA.slice(0,52)}</div>
        <div style={{textAlign:"right",fontSize:13,fontWeight:700,color:CLR.cyan,fontFamily:"'Barlow Condensed',sans-serif"}}>{(pair.pA*100).toFixed(1)}¢</div>
        <div style={{fontSize:8,color:CLR.txt,lineHeight:1.35}}>{pair.labelB.slice(0,52)}</div>
        <div style={{textAlign:"right",fontSize:13,fontWeight:700,color:val.valid?CLR.amber:CLR.txt,fontFamily:"'Barlow Condensed',sans-serif"}}>{(pair.pB*100).toFixed(1)}¢</div>
      </div>
      {est&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1px 1fr",marginBottom:6,background:CLR.bg2,borderRadius:2,border:`1px solid ${CLR.line2}`,overflow:"hidden"}}>
          <div style={{padding:"4px 8px"}}>
            <div style={{fontSize:7,color:CLR.muted,marginBottom:2}}>P(B | A)</div>
            <div style={{fontSize:14,fontWeight:700,color:CLR.cyan,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1}}>{(est.pB_givenA*100).toFixed(1)}¢</div>
            <div style={{fontSize:7,color:CLR.muted,marginTop:1}}>IC [{(est.ci_H[0]*100).toFixed(0)}–{(est.ci_H[1]*100).toFixed(0)}]¢</div>
          </div>
          <div style={{background:CLR.line2}}/>
          <div style={{padding:"4px 8px"}}>
            <div style={{fontSize:7,color:CLR.muted,marginBottom:2}}>P(B | ¬A)</div>
            <div style={{fontSize:14,fontWeight:700,color:CLR.txt2,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1}}>{(est.pB_givenNotA*100).toFixed(1)}¢</div>
            <div style={{fontSize:7,color:CLR.muted,marginTop:1}}>IC [{(est.ci_L[0]*100).toFixed(0)}–{(est.ci_L[1]*100).toFixed(0)}]¢</div>
          </div>
        </div>
      )}
      {est&&(
        <div style={{marginBottom:5}}>
          <CIBar fair={pair.pBFair} fairCI={pair.fairCI} marketPrice={pair.pB}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:1}}>
            <span style={{fontSize:7,color:CLR.muted}}>0¢</span>
            <span style={{fontSize:7,color:CLR.muted}}>50¢</span>
            <span style={{fontSize:7,color:CLR.muted}}>100¢</span>
          </div>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <Stat label="FAIR"  value={`${(pair.pBFair*100).toFixed(1)}¢`}         color={CLR.cyan}/>
        <Stat label="EDGE"  value={`${(pair.edge*100).toFixed(1)}%`}            color={val.valid?CLR.green:CLR.muted}/>
        <Stat label="δ"     value={est?`${(est.delta*100).toFixed(0)}pp`:"–"}   color={est?depC:CLR.muted} tiny/>
        <Stat label="p-val" value={est?est.pValue.toFixed(3):"–"}               color={est?.significant?CLR.green:CLR.red} tiny/>
        <Stat label="χ²"    value={est?est.chi2.toFixed(1):"–"}                 color={CLR.txt} tiny/>
        <Stat label="SLIP"  value={`${(pair.slip*100).toFixed(1)}%`}            color={pair.slip>cfg.slipMax?CLR.red:CLR.muted} tiny/>
        <Stat label="KELLY" value={`$${pair.kellyUSDC.toFixed(0)}`}            color={CLR.amber}/>
        <div style={{marginLeft:"auto",display:"flex",gap:4}}>
          <button onClick={()=>onAI(pair.id)} disabled={pair.aiLoading||!est}
            title={est?"Analyse IA":"Pas encore de données"}
            style={{background:CLR.violetD,border:`1px solid ${hasAI?CLR.violet:CLR.muted}`,
              color:pair.aiLoading?CLR.muted:CLR.violet,padding:"3px 7px",fontSize:9,
              cursor:est&&!pair.aiLoading?"pointer":"default",borderRadius:2,fontFamily:"inherit"}}>
            {pair.aiLoading?<Spinner/>:"🤖"}

function applyFilterSort(pairs,filter,sort){
  let out=[...pairs];
  if(filter==="signal") out=out.filter(p=>p.validation?.valid);
  else if(filter==="strong") out=out.filter(p=>p.bayesEst?.depClass==="strong");
  else if(filter==="struct") out=out.filter(p=>p.structural?.arb);
  if(sort==="edge")  out.sort((a,b)=>Math.abs(b.edge)-Math.abs(a.edge));
  else if(sort==="delta") out.sort((a,b)=>(b.bayesEst?.delta??0)-(a.bayesEst?.delta??0));
  else if(sort==="pval")  out.sort((a,b)=>(a.bayesEst?.pValue??1)-(b.bayesEst?.pValue??1));
  else if(sort==="n")     out.sort((a,b)=>(b.bayesEst?.n??0)-(a.bayesEst?.n??0));
  return out;
}

// BT-1 : Mouvement brownien corrélé (Cholesky 2×2)
function genSeries(n, startA, startB, sigma, rho) {
  const seriesA=new Float64Array(n), seriesB=new Float64Array(n);
  seriesA[0]=startA; seriesB[0]=startB;
  const sqrtTerm=Math.sqrt(Math.max(0,1-rho*rho));
  const randn=()=>{
    const u1=Math.max(1e-10,Math.random()),u2=Math.random();
    return Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
  };
  for(let i=1;i<n;i++){
    const z1=randn(),z2=randn();
    seriesA[i]=clamp(seriesA[i-1]+sigma*z1,0.01,0.99);
    seriesB[i]=clamp(seriesB[i-1]+sigma*(rho*z1+sqrtTerm*z2),0.01,0.99);
  }
  return{seriesA,seriesB};
}

// BT-2 : Moteur de simulation — réutilise SANS MODIFICATION les fonctions pures
function runBacktest(btCfg, cfg) {
  const{btStartA,btStartB,btSigma,btRho,btN,btBankroll:initBr}=btCfg;
  const{seriesA,seriesB}=genSeries(btN,btStartA,btStartB,btSigma,btRho);
  const cfgBT={...cfg,requireBH:0}; // BH non pertinent sur paire unique
  let btBankroll=initBr;
  const btTrades=[],equityCurve=new Float64Array(btN);
  let btPos=null,maxBr=initBr,maxDD=0;
  const histA=[],histB=[];

  for(let i=0;i<btN;i++){
    histA.push(seriesA[i]); histB.push(seriesB[i]);
    const unrealized=btPos?btPos.size*(seriesB[i]-btPos.entryPrice)/btPos.entryPrice:0;
    equityCurve[i]=btBankroll+unrealized;
    if(equityCurve[i]>maxBr) maxBr=equityCurve[i];
    const dd=(maxBr-equityCurve[i])/maxBr;
    if(dd>maxDD) maxDD=dd;

    // Vérifier sortie
    if(btPos){
      const pnlPct=(seriesB[i]-btPos.entryPrice)/btPos.entryPrice;
      const closeReason=i===btN-1?"END_BT":pnlPct<=-cfg.stopLoss?"SL_BT":pnlPct>=cfg.takeProfit?"TP_BT":null;
      if(closeReason){
        const pnlUSDC=btPos.size*(seriesB[i]-btPos.entryPrice)/btPos.entryPrice;
        btBankroll+=btPos.size+pnlUSDC;
        btTrades.push({tickIn:btPos.entryTick,priceIn:btPos.entryPrice,tickOut:i,priceOut:seriesB[i],pnlUSDC,reason:closeReason});
        btPos=null;
      }
    }
    // Chercher entrée
    if(!btPos&&i>=cfgBT.minBayesPts){
      const est=computeBayesEst(histA,histB,seriesA[i]);
      const val=validateSignal(est,seriesB[i],cfgBT);
      if(val.valid&&btBankroll>=1){
        // [4] winProb = borne basse CI95
        const winProbBT=est?clamp(est.fairCI[0],0.01,0.95):0.5;
        const size=kellySize(seriesB[i],winProbBT,btBankroll,cfgBT,est);
        if(size>=0.5){btBankroll-=size;btPos={entryTick:i,entryPrice:seriesB[i],size};}
      }
    }
  }

  const wins=btTrades.filter(t=>t.pnlUSDC>0).length;
  const totalPnl=btTrades.reduce((s,t)=>s+t.pnlUSDC,0);
  const returns=btTrades.map(t=>t.pnlUSDC/Math.max(t.tickOut-t.tickIn,1));
  return{
    btTrades,equityCurve,seriesA,seriesB,
    stats:{pnl:totalPnl,pnlPct:totalPnl/initBr*100,winRate:btTrades.length?wins/btTrades.length:0,
           sharpe:calcSharpe(returns),maxDD:maxDD*100,nTrades:btTrades.length,finalBr:btBankroll},
  };
}

      </div>

      <div style={{fontSize:8,color:CLR.orange,letterSpacing:2,marginBottom:8,fontWeight:700}}>PARAMÈTRES SIMULATION</div>
      {btRow("btStartA","PRIX DÉPART A",0.01,0.99,0.01,v=>`${(v*100).toFixed(0)}¢`)}
      {btRow("btStartB","PRIX DÉPART B",0.01,0.99,0.01,v=>`${(v*100).toFixed(0)}¢`)}
      {btRow("btSigma","VOLATILITÉ σ",0.002,0.05,0.001,v=>v.toFixed(3))}
      {btRow("btRho","CORRÉLATION ρ",-1.0,1.0,0.05,v=>v.toFixed(2))}
      {btRow("btN","TICKS",50,500,10,v=>v)}
      {btRow("btBankroll","BANKROLL BT ($)",100,10000,100,v=>`$${v}`)}

      <div style={{fontSize:7,color:CLR.muted,marginBottom:8,lineHeight:1.5}}>
        Paramètres live réutilisés : minEdge={Math.round(cfg.minEdge*100)}% · kelly={Math.round(cfg.kellyFrac*100)}% · SL={Math.round(cfg.stopLoss*100)}% · TP={Math.round(cfg.takeProfit*100)}% · minPts={cfg.minBayesPts}
      </div>

      <button onClick={handleRun} disabled={running} style={{width:"100%",marginBottom:12,padding:"7px",
        background:CLR.orangeD,border:`1px solid ${CLR.orange}`,color:running?CLR.muted:CLR.orange,
        fontSize:9,fontWeight:700,letterSpacing:1,cursor:running?"default":"pointer",borderRadius:2,fontFamily:"inherit"}}>
        {running?"SIMULATION EN COURS…":"▶ RUN BT"}
      </button>

      {result&&(()=>{
        const s=result.stats;
        return(
          <>
            <div style={{fontSize:8,color:CLR.orange,letterSpacing:2,marginBottom:6,fontWeight:700}}>RÉSULTATS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:8}}>
              {[
                {l:"BT PnL",    v:`${s.pnl>=0?"+":""}$${s.pnl.toFixed(2)}`,        c:s.pnl>=0?CLR.green:CLR.red},
                {l:"PERF %",    v:`${s.pnlPct>=0?"+":""}${s.pnlPct.toFixed(1)}%`,  c:s.pnlPct>=0?CLR.green:CLR.red},
                {l:"WIN RATE",  v:`${(s.winRate*100).toFixed(0)}%`,                 c:s.winRate>=0.5?CLR.green:CLR.red},
                {l:"SHARPE BT", v:s.sharpe.toFixed(2),                              c:s.sharpe>=1?CLR.green:s.sharpe>=0?CLR.orange:CLR.red},
                {l:"MAX DD",    v:`-${s.maxDD.toFixed(1)}%`,                        c:s.maxDD>15?CLR.red:CLR.orange},
                {l:"TRADES",    v:s.nTrades,                                         c:CLR.orange},
                {l:"BR FINALE", v:`$${s.finalBr.toFixed(0)}`,                       c:CLR.orange},
              ].map(({l,v,c})=>(
                <div key={l} style={{padding:"4px 6px",background:CLR.bg2,border:`1px solid ${CLR.line2}`,borderRadius:2}}>
                  <div style={{fontSize:6,color:CLR.muted,letterSpacing:.8}}>{l}</div>
                  <div style={{fontSize:10,fontWeight:700,color:c,fontFamily:"'Barlow Condensed',sans-serif"}}>{v}</div>
                </div>
              ))}
            </div>

            <div style={{marginBottom:8}}>
              <div style={{fontSize:7,color:CLR.muted,marginBottom:3,letterSpacing:.8}}>EQUITY CURVE</div>
              {renderEquity(result.equityCurve,btCfg.btBankroll)}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                <span style={{fontSize:6,color:CLR.muted}}>tick 0</span>
                <span style={{fontSize:6,color:CLR.muted}}>tick {btCfg.btN-1}</span>
              </div>
            </div>

            {result.btTrades.length>0?(
              <>
                <div style={{fontSize:7,color:CLR.muted,marginBottom:4,letterSpacing:.8}}>TRADES ({result.btTrades.length})</div>
                <div style={{overflowY:"auto",maxHeight:160,border:`1px solid ${CLR.line2}`,borderRadius:2}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:7}}>
                    <thead>
                      <tr style={{background:CLR.bg2}}>
                        {["In","P.In","Out","P.Out","PnL $","Raison"].map(h=>(
                          <th key={h} style={{padding:"3px 4px",color:CLR.muted,fontWeight:700,textAlign:"right",borderBottom:`1px solid ${CLR.line2}`}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {result.btTrades.map((t,i)=>(
                        <tr key={i} style={{borderBottom:`1px solid ${CLR.line}`}}>
                          <td style={{padding:"2px 4px",color:CLR.txt,textAlign:"right"}}>{t.tickIn}</td>
                          <td style={{padding:"2px 4px",color:CLR.cyan,textAlign:"right"}}>{(t.priceIn*100).toFixed(0)}¢</td>
                          <td style={{padding:"2px 4px",color:CLR.txt,textAlign:"right"}}>{t.tickOut}</td>
                          <td style={{padding:"2px 4px",color:CLR.txt2,textAlign:"right"}}>{(t.priceOut*100).toFixed(0)}¢</td>
                          <td style={{padding:"2px 4px",color:t.pnlUSDC>=0?CLR.green:CLR.red,textAlign:"right",fontWeight:700}}>{t.pnlUSDC>=0?"+":""}${t.pnlUSDC.toFixed(2)}</td>
                          <td style={{padding:"2px 4px",color:t.reason==="SL_BT"?CLR.red:t.reason==="TP_BT"?CLR.green:CLR.muted,textAlign:"right"}}>{t.reason}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            ):(
              <div style={{padding:10,color:CLR.muted,fontSize:8,textAlign:"center"}}>Aucun trade généré — assouplir les paramètres.</div>
            )}
          </>
        );
      })()}
    </div>
  );
}

// ─── STYLES ───────────────────────────────────────────────────
const STYLES=`
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Barlow+Condensed:wght@500;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;}
body{background:#030b12;font-family:'JetBrains Mono',monospace;font-size:11px;color:#4d7f99;overflow:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#0e2d43;border-radius:2px;}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{to{transform:rotate(360deg)}}
input[type=range]{height:2px;cursor:pointer;appearance:auto;}
button:focus{outline:none;}
select:focus{outline:none;}
table{font-family:'JetBrains Mono',monospace;}
`;

// ─── APP ──────────────────────────────────────────────────────
function PolyArb() {
  const store=useStore();
  const{cfg,setCfg,bankroll,startBr,pairs,positions,logs,metrics,apiSt,tab,setTab,
        discovering,execute,closePos,discover,requestAI,currentExposure}=store;

  const [scanFilter,setScanFilter]=useState("all");
  const [scanSort,setScanSort]=useState("edge");

  useEffect(()=>{
    const s=document.createElement("style");
    s.textContent=STYLES;
    document.head.appendChild(s);
    return()=>document.head.removeChild(s);
  },[]);

  const mode=cfg.proxyUrl?"LIVE":"PAPER";
  const openPos=positions.filter(p=>p.status==="OPEN");
  const closedPos=positions.filter(p=>p.status==="CLOSED");
  const signals=pairs.filter(p=>p.validation?.valid).length;
  const strongDep=pairs.filter(p=>p.bayesEst?.depClass==="strong").length;
  const structArb=pairs.filter(p=>p.structural?.arb).length;
  const visiblePairs=applyFilterSort(pairs,scanFilter,scanSort);
  const expoUSDC=currentExposure();
  const expoPct=bankroll>0?expoUSDC/bankroll:0;
  // [6] PnL session = bankroll − startBr
  const sessionPnl=bankroll-startBr;

  return(
    <div style={{display:"grid",gridTemplateRows:"46px 22px 1fr",height:"100vh",background:CLR.bg0}}>

      {/* TOP BAR */}
      <div style={{background:CLR.bg2,borderBottom:`1px solid ${CLR.line2}`,display:"flex",alignItems:"center",padding:"0 14px",gap:16,position:"relative",overflow:"hidden",flexShrink:0}}>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:`linear-gradient(90deg,transparent,${CLR.amber} 25%,${CLR.cyan} 75%,transparent)`,opacity:.35}}/>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,letterSpacing:5,color:CLR.amber,flexShrink:0}}>
          POLY<span style={{color:CLR.cyan}}>ARB</span><sup style={{fontSize:9,color:CLR.green,marginLeft:2,fontWeight:600}}>v8</sup>
        </div>
        <div style={{fontSize:7,color:CLR.muted,letterSpacing:2,lineHeight:1.4}}>BAYESIAN<br/>CAUSAL</div>
        <div style={{display:"flex",gap:1,marginLeft:"auto",height:"100%"}}>
          {[
            {l:"BANKROLL", v:`$${bankroll.toFixed(0)}`,                                    c:CLR.amber},
            // [6] PnL = bankroll − startBr
            {l:"PnL",      v:`${sessionPnl>=0?"+":""}$${sessionPnl.toFixed(2)}`,           c:sessionPnl>=0?CLR.green:CLR.red},
            {l:"WIN",      v:`${(metrics.winRate*100).toFixed(0)}%`,                        c:metrics.winRate>=0.5?CLR.green:CLR.txt},
            {l:"SHARPE",   v:metrics.sharpe.toFixed(2),                                     c:metrics.sharpe>=1?CLR.green:metrics.sharpe>=0?CLR.amber:CLR.red},
            {l:"EXPO",     v:`${(expoPct*100).toFixed(0)}%`,                                c:expoPct>cfg.maxExposure*0.8?CLR.red:CLR.muted},
            {l:"SIGNAUX",  v:signals,                                                        c:signals>0?CLR.green:CLR.muted},
            {l:"DEP FORT", v:strongDep,                                                      c:strongDep>0?CLR.cyan:CLR.muted},
            {l:"STRUCT",   v:structArb,                                                      c:structArb>0?CLR.orange:CLR.muted},
          ].map(({l,v,c})=>(
            <div key={l} style={{padding:"0 9px",display:"flex",flexDirection:"column",justifyContent:"center",borderLeft:`1px solid ${CLR.line}`,minWidth:54}}>
              <div style={{fontSize:7,color:CLR.muted,letterSpacing:1.2,marginBottom:2,textTransform:"uppercase"}}>{l}</div>
              <div style={{fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",color:c,lineHeight:1}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* MODE BANNER */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 14px",
        background:mode==="LIVE"?"rgba(0,230,118,.04)":"rgba(255,179,0,.04)",
        borderBottom:`1px solid ${mode==="LIVE"?"rgba(0,230,118,.18)":"rgba(255,179,0,.15)"}`}}>
        <span style={{fontSize:8,fontWeight:700,letterSpacing:2,color:mode==="LIVE"?CLR.green:CLR.amber,animation:"blk 2s ease infinite"}}>● {mode}</span>
        <span style={{fontSize:7,color:CLR.muted}}>
          {mode==="LIVE"?`Proxy: ${cfg.proxyUrl}`:"Simulation — BH 10% · BUY/SELL · AutoExec · Kelly×IA · FLIP exit"}
        </span>
        <span style={{marginLeft:"auto",fontSize:7,color:CLR.muted}}>
          Gamma: <span style={{color:apiSt.gamma==="ok"?CLR.green:apiSt.gamma==="cors"?CLR.red:CLR.amber}}>{apiSt.gamma.toUpperCase()}</span>
          {" "}CLOB: <span style={{color:apiSt.clob==="ok"?CLR.green:CLR.amber}}>{apiSt.clob.toUpperCase()}</span>
          {" "}| {pairs.length} paires | {openPos.length} ouv | expo ${expoUSDC.toFixed(0)}
        </span>
      </div>

      {/* MAIN GRID */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:1,background:CLR.line,minHeight:0,overflow:"hidden"}}>

        {/* LEFT: SCANNER */}
        <div style={{background:CLR.bg1,display:"flex",flexDirection:"column",minHeight:0}}>
          <div style={{padding:"5px 10px",borderBottom:`1px solid ${CLR.line}`,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,color:CLR.amber}}>SCANNER</span>
            {discovering&&<span style={{fontSize:7,color:CLR.cyan,animation:"blk 1s ease infinite"}}>DISCOVERING…</span>}
            <span style={{marginLeft:"auto",fontSize:7,color:CLR.muted}}>
              {pairs.filter(p=>(p.bayesEst?.n??0)>=cfg.minBayesPts).length}/{pairs.length} matures
            </span>
          </div>
          <ScannerControls filter={scanFilter} setFilter={setScanFilter} sort={scanSort} setSort={setScanSort} total={pairs.length} visible={visiblePairs.length}/>
          <div style={{overflowY:"auto",flex:1}}>
            {pairs.length===0
              ?<div style={{padding:24,color:CLR.muted,fontSize:9,textAlign:"center",lineHeight:1.8}}>
                Découverte des marchés…<br/>
                <span style={{fontSize:7}}>BH FDR · CI₉₅ Kelly · batch {cfg.apiBatch}×{cfg.apiDelay}ms</span>
              </div>
              :visiblePairs.length===0
              ?<div style={{padding:20,color:CLR.muted,fontSize:9,textAlign:"center"}}>Aucune paire pour ce filtre.</div>
              :visiblePairs.map(pair=>(<PairRow key={pair.id} pair={pair} cfg={cfg} onExec={execute} onAI={requestAI}/>))
            }
          </div>
        </div>

        {/* RIGHT: TABS — [4] onglet BT ajouté */}
        <div style={{background:CLR.bg1,display:"flex",flexDirection:"column",minHeight:0}}>
          <div style={{display:"flex",borderBottom:`1px solid ${CLR.line}`,flexShrink:0}}>
            {[
              {id:"pos",  label:`POS(${openPos.length})`},
              {id:"hist", label:`HIST(${closedPos.length})`},
              {id:"dep",  label:"DEP"},
              {id:"log",  label:"LOG"},
              {id:"cfg",  label:"CFG"},
              {id:"bt",   label:"BT"},
            ].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                flex:1,padding:"6px 1px",fontSize:7,fontWeight:700,letterSpacing:.4,
                background:tab===t.id?(t.id==="bt"?CLR.orangeD:CLR.amberD):"transparent",
                color:tab===t.id?(t.id==="bt"?CLR.orange:CLR.amber):CLR.muted,
                border:"none",borderRight:`1px solid ${CLR.line}`,
                cursor:"pointer",fontFamily:"inherit",
              }}>{t.label}</button>
            ))}
          </div>
          <div style={{overflowY:"auto",flex:1}}>
            {tab==="pos"&&(openPos.length===0
              ?<div style={{padding:16,color:CLR.muted,fontSize:8,textAlign:"center"}}>Aucune position ouverte</div>
              :openPos.map(p=><PosRow key={p.id} pos={p} onClose={closePos}/>)
            )}
            {tab==="hist"&&(closedPos.length===0
              ?<div style={{padding:16,color:CLR.muted,fontSize:8,textAlign:"center"}}>Aucun historique</div>
              :[...closedPos].reverse().map(p=><PosRow key={p.id} pos={p} onClose={()=>{}}/>)
            )}
            {tab==="dep"&&<GraphPanel pairs={pairs}/>}
            {tab==="log"&&(logs.length===0
              ?<div style={{padding:16,color:CLR.muted,fontSize:8}}>En attente…</div>
              :[...logs].reverse().map(e=><LogRow key={e.id} e={e}/>)
            )}
            {tab==="cfg"&&<ConfigPanel cfg={cfg} setCfg={setCfg} onDiscover={discover} discovering={discovering}/>}
            {tab==="bt"&&<BacktestPanel cfg={cfg}/>}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PolyArb />);
  </script>
</body>
</html>
